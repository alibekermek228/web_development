<div class="page">
  <h1>Online Store 2</h1>

  <div class="categories">
    @for (category of categories; track category.id) {
      <button
        type="button"
        class="category-btn"
        [class.active]="selectedCategoryId === category.id"
        (click)="chooseCategory(category)">
        {{ category.name }}
      </button>
    }
  </div>

  @if (selectedCategoryId === null) {
    <p class="welcome">Выберите категорию, чтобы увидеть товары.</p>
  } @else {
    <h2>{{ selectedCategoryName }}</h2>
    <app-product-list [products]="categoryProducts" (deleteProduct)="onDeleteProduct($event)"></app-product-list>
  }
</div>
