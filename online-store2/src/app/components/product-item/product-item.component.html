<article class="card">
  <img [src]="currentImage" [alt]="product.name" class="main-image" />

  <div class="thumbs">
    @for (img of product.images; track img) {
      <button type="button" class="thumb-btn" [class.active]="currentImage === img" (click)="selectImage(img)">
        <img [src]="img" [alt]="product.name" class="thumb-image" />
      </button>
    }
  </div>

  <h3>{{ product.name }}</h3>
  <p class="description">{{ product.description }}</p>
  <p class="price">{{ product.price | currency : 'KZT' : 'symbol' : '1.0-0' }}</p>

  <div class="rating">
    @for (star of stars; track star) {
      <span [class.filled]="isFilled(star)">★</span>
    }
    <span class="rating-value">{{ product.rating | number : '1.1-1' }}</span>
  </div>

  <p class="likes">❤ {{ product.likes }}</p>

  <div class="actions">
    <button class="btn like" type="button" (click)="likeProduct()">Like</button>
    <button class="btn delete" type="button" (click)="removeProduct()">Delete</button>
    <a class="btn open" [href]="product.link" target="_blank" rel="noopener noreferrer">Kaspi</a>
    <a class="btn share" [href]="whatsappUrl()" target="_blank" rel="noopener noreferrer">WhatsApp</a>
    <a class="btn share2" [href]="telegramUrl()" target="_blank" rel="noopener noreferrer">Telegram</a>
  </div>
</article>
